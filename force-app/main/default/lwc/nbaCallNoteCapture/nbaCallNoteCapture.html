<template>
    <!-- Full-page overlay backdrop -->
    <div class="overlay-backdrop" onclick={handleSkip}></div>

    <!-- Centered card -->
    <div class="overlay-card">
        <!-- Header -->
        <div class="card-header">
            <div class="header-left">
                <lightning-icon icon-name="utility:call" size="x-small"></lightning-icon>
                <span class="header-title">Call Completed</span>
            </div>
            <button class="close-btn" onclick={handleSkip}>&times;</button>
        </div>

        <!-- Body -->
        <div class="card-body">
            <!-- Sparkle icon + heading -->
            <div class="hero-section">
                <div class="sparkle-icon">
                    <lightning-icon icon-name="utility:sparkles" size="small"></lightning-icon>
                </div>
                <h2 class="hero-title">Call Completed!</h2>
                <p class="disposition-line">{dispositionLine}</p>
            </div>

            <!-- Notes textarea -->
            <div class="notes-section">
                <label class="notes-label" for="call-notes-input">Call Notes</label>
                <textarea
                    id="call-notes-input"
                    class="notes-textarea"
                    value={editedNotes}
                    onchange={handleNotesChange}
                    rows="5"
                    placeholder="Add call notes..."></textarea>
            </div>

            <!-- Buttons -->
            <div class="button-row">
                <button class="btn-secondary" onclick={handleSkip}>Continue Editing</button>
                <button class="btn-primary" onclick={handleSave}>Save &amp; Next Opportunity</button>
            </div>
        </div>
    </div>
</template>

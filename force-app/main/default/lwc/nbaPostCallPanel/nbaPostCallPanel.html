<template>
    <div class="overlay-backdrop" onclick={handleBackdropClick}>
        <div class="overlay-card" onclick={handleCardClick}>
            <!-- Header -->
            <div class="card-header">
                <div class="header-left">
                    <span class="header-phone-badge">
                        <lightning-icon icon-name="utility:call" size="xx-small" variant="inverse"></lightning-icon>
                    </span>
                    <span class="header-title">Post-Call Review</span>
                </div>
                <button class="close-btn" onclick={handleSkip} title="Close">
                    <lightning-icon icon-name="utility:close" size="xx-small"></lightning-icon>
                </button>
            </div>

            <div class="card-body">
                <!-- Hero -->
                <div class="hero-section">
                    <div class="hero-icon-wrap">
                        <lightning-icon icon-name="utility:magicwand" size="small" variant="inverse"></lightning-icon>
                    </div>
                    <h2 class="hero-title">Call Analysis Complete</h2>
                    <p class="hero-subtitle">{heroSubtitle}</p>
                </div>

                <!-- Call Notes card -->
                <div class="notes-card">
                    <div class="notes-card-header">
                        <lightning-icon icon-name="utility:description" size="xx-small" class="notes-icon"></lightning-icon>
                        <span class="notes-card-title">Call Notes</span>
                    </div>
                    <template lwc:if={isEditMode}>
                        <textarea
                            class="notes-textarea"
                            value={notesValue}
                            onchange={handleNotesChange}
                            placeholder="No call notes available"
                            rows="4"></textarea>
                    </template>
                    <template lwc:else>
                        <p class={notesTextClass}>{notesDisplayValue}</p>
                    </template>
                </div>

                <!-- Recommended Update card -->
                <template lwc:if={showRecommendedUpdate}>
                    <div class="update-card">
                        <div class="update-card-header">
                            <span class="update-label">Recommended Update</span>
                            <template lwc:if={showStageTransition}>
                                <span class="confidence-badge">High Confidence</span>
                            </template>
                        </div>

                        <!-- Stage transition row -->
                        <template lwc:if={showStageTransition}>
                            <div class="stage-row">
                                <div class="stage-block">
                                    <span class="stage-caption">Current Stage</span>
                                    <span class="stage-name-current">{displayCurrentStage}</span>
                                </div>
                                <div class="stage-arrow-wrap">
                                    <lightning-icon icon-name="utility:forward" size="xx-small" class="stage-arrow-icon"></lightning-icon>
                                </div>
                                <div class="stage-block stage-block-right">
                                    <span class="stage-caption">New Stage</span>
                                    <span class="stage-name-new">{displayNewStage}</span>
                                </div>
                            </div>
                        </template>

                        <!-- Detected Criteria -->
                        <template lwc:if={hasDetectedFields}>
                            <div class="criteria-box">
                                <h4 class="criteria-title">Detected Criteria:</h4>

                                <!-- Text and picklist fields (one per row) -->
                                <template for:each={detectedTextFields} for:item="field">
                                    <div key={field.fieldName} class="criteria-text-field" style={field.staggerStyle}>
                                        <div class="criteria-field-label-row">
                                            <span class="criteria-field-label">{field.label}</span>
                                            <lightning-icon icon-name="utility:info" size="xx-small" class="info-icon" title={field.gateLabel}></lightning-icon>
                                        </div>
                                        <template lwc:if={isEditMode}>
                                            <template lwc:if={field.isPicklist}>
                                                <lightning-combobox
                                                    data-field={field.fieldName}
                                                    value={field.editPicklistValue}
                                                    options={inceptionSwitcherOptions}
                                                    variant="label-hidden"
                                                    onchange={handlePicklistChange}></lightning-combobox>
                                            </template>
                                            <template lwc:else>
                                                <textarea
                                                    class="edit-textarea"
                                                    data-field={field.fieldName}
                                                    value={field.editTextValue}
                                                    onchange={handleTextFieldChange}
                                                    rows="2"></textarea>
                                            </template>
                                        </template>
                                        <template lwc:else>
                                            <div class="criteria-text-value">{field.displayValue}</div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Boolean fields (2-column grid) -->
                                <template lwc:if={hasBooleanDetectedFields}>
                                    <div class="criteria-bool-grid">
                                        <template for:each={detectedBooleanFields} for:item="field">
                                            <div key={field.fieldName} class="criteria-bool-field" style={field.staggerStyle}>
                                                <template lwc:if={isEditMode}>
                                                    <label class="toggle-container">
                                                        <input
                                                            type="checkbox"
                                                            class="toggle-input"
                                                            data-field={field.fieldName}
                                                            checked={field.editBoolChecked}
                                                            onchange={handleBooleanToggle} />
                                                        <span class="toggle-slider"></span>
                                                        <span class="toggle-label">{field.label}</span>
                                                    </label>
                                                </template>
                                                <template lwc:else>
                                                    <span class="criteria-bool-label">{field.label}</span>
                                                    <div class="criteria-bool-value">
                                                        <lightning-icon icon-name="utility:check" size="xx-small" class="bool-check-icon"></lightning-icon>
                                                        <span class="bool-yes-text">{field.booleanLabel}</span>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Empty state: no qualification data -->
                <template lwc:if={showEmptyState}>
                    <div class="empty-state-card">
                        <lightning-icon icon-name="utility:info" size="x-small" class="empty-icon"></lightning-icon>
                        <span class="empty-text">No qualification data extracted from this call</span>
                    </div>
                </template>
            </div>

            <!-- Button row -->
            <div class="button-row">
                <button class="btn btn-secondary" onclick={handleEditFields}>
                    <lightning-icon icon-name={editButtonIcon} size="xx-small" class="btn-edit-icon"></lightning-icon>
                    <span>{editButtonLabel}</span>
                </button>
                <button class="btn btn-primary" onclick={handleConfirm}>{confirmButtonLabel}</button>
            </div>
        </div>
    </div>
</template>
